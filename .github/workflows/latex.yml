name: LaTeX

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '*.tex'
      - '*.bib'
      - '*.cls'
      - '*.sty'
      - 'figures/**'
      - 'Makefile'
      - 'latexmkrc'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          latexmk_shell_escape: true

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: main.pdf
          path: main.pdf
