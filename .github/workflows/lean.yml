name: Lean 4

on:
  push:
    paths:
      - 'formalization/**'
  pull_request:
    paths:
      - 'formalization/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formalization/MailboxActors
