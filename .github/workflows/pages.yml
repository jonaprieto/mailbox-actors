name: Deploy Spec to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'formalization/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formalization/MailboxActors
          build-args: generate-spec
      - name: Generate HTML spec
        run: cd formalization/MailboxActors && lake exe generate-spec
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: formalization/MailboxActors/_out/html-multi/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
